<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop — Dressify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Manrope:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="navbar container" aria-label="Main">
        <a href="index.html" class="logo">Dressify</a>
        <ul class="nav-menu">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="category.html?category=men" class="nav-link">Shop</a></li>
          <li>
            <a href="cart.html" class="nav-link nav-cart">
              Cart
              <span class="cart-count" id="cartCount" aria-live="polite">0</span>
            </a>
          </li>
        </ul>
        <button
          type="button"
          class="menu-toggle"
          id="menuToggle"
          aria-label="Open menu"
          aria-expanded="false"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
      </nav>
    </header>

    <main class="page-main">
      <section class="section section--page-head">
        <div class="container">
          <p class="breadcrumb">
            <a href="index.html">Home</a>
            <span aria-hidden="true">/</span>
            <span id="categoryCrumb">Shop</span>
          </p>
          <h1 class="page-title" id="categoryTitleDisplay">Shop</h1>

          <div class="category-pills" id="categoryNav"></div>
        </div>
      </section>

      <section class="section section--flush-top">
        <div class="container">
          <div class="product-grid" id="productGrid"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p class="footer-brand">Dressify</p>
        <p class="footer-copy">All rights reserved.</p>
      </div>
    </footer>

    <script src="products-data.js"></script>
    <script src="cart.js"></script>
    <script src="nav.js"></script>
    <script src="category.js"></script>
  </body>
</html>
